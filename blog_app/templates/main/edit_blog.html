<html>
<head>
    <title>Edit Blog</title>
    {% load static %}
    <link href="{% static 'src/styles.css' %}" rel="stylesheet" />
</head>

<body>
{% include "components/_navbar.html" %}

<section class="min-h-screen bg-gray-100 flex items-center justify-center px-4 sm:px-6 lg:px-8 py-12">
  <div class="max-w-3xl w-full bg-white p-8 rounded-xl shadow-md">
    
    <!-- Heading -->
    <h2 class="text-2xl font-bold text-gray-800 mb-6 text-center">Edit Blog</h2>

    <!-- Blog Form -->
    <form action="" method="POST" enctype="multipart/form-data" class="space-y-5">
      {% csrf_token %}

      <!-- Facebook Style Image Upload -->
      <div class="flex justify-center">
        <div class="relative w-40 h-40 cursor-pointer group" onclick="openFileInput()">

          {% if prev_data.image %}
            <img 
              id="imagePreview"
              src="{{ prev_data.image.url }}" 
              class="w-full h-full object-cover rounded-full border-4 border-gray-200 shadow-md"
            >
          {% else %}
            <div 
              id="imagePreview"
              class="w-full h-full flex items-center justify-center rounded-full bg-gray-200 text-gray-400 border-4 border-gray-200 shadow-md">
              No Image
            </div>
          {% endif %}

          <!-- Hover Overlay -->
          <div class="absolute inset-0 bg-black bg-opacity-40 rounded-full flex items-center justify-center 
                      opacity-0 group-hover:opacity-100 transition">
            <span class="text-white text-sm font-semibold">Change</span>
          </div>

          <!-- Camera Icon -->
          <div class="absolute bottom-2 right-2 bg-white p-2 rounded-full shadow">
            📷
          </div>
        </div>

        <!-- Hidden File Input -->
        <input 
          type="file" 
          id="image" 
          name="image" 
          accept="image/*"
          onchange="previewImage(event)"
          class="hidden"
        />
      </div>

      <!-- Title -->
      <div>
        <label for="title" class="block text-sm font-medium text-gray-700 mb-1">Title</label>
        <input type="text" id="title" name="title" value="{{prev_data.title}}" 
          class="w-full border border-gray-300 px-4 py-2 rounded-md focus:ring-2 focus:ring-indigo-500 focus:outline-none" />
          <span class="text-red-500">{{errors.title}}</span>
      </div>

      <!-- Category -->
      <div>
        <label for="category" class="block text-sm font-medium text-gray-700 mb-1">Category</label>
        <select id="category" name="category" required
          class="w-full border border-gray-300 px-4 py-2 rounded-md focus:ring-2 focus:ring-indigo-500 focus:outline-none">
          <option value="{{prev_data.category}}">{{prev_data.category}}</option>
          <option value="technology">Technology</option>
          <option value="lifestyle">Lifestyle</option>
          <option value="travel">Travel</option>
          <option value="coding">Coding</option>
        </select>
      </div>

      <!-- Description -->
      <div>
        <label for="description" class="block text-sm font-medium text-gray-700 mb-1">Description</label>
        <textarea id="description" name="description" rows="5"
          class="w-full border border-gray-300 px-4 py-2 rounded-md focus:ring-2 focus:ring-indigo-500 focus:outline-none resize-none">{{prev_data.description}}</textarea>
      </div>

      <!-- Submit Button -->
      <div class="pt-2">
        <button type="submit"
          class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2.5 rounded-md transition">
          Update Blog
        </button>
      </div>
    </form>
  </div>
</section>

<!-- JavaScript -->
<script>
  function openFileInput() {
    document.getElementById('image').click();
  }

  function previewImage(event) {
    const input = event.target;
    let preview = document.getElementById('imagePreview');

    if (input.files && input.files[0]) {
      const reader = new FileReader();

      reader.onload = function(e) {
        // If it's not an image, replace it
        if (preview.tagName.toLowerCase() !== "img") {
          const img = document.createElement("img");
          img.id = "imagePreview";
          img.className = "w-full h-full object-cover rounded-full border-4 border-gray-200 shadow-md";
          preview.parentNode.replaceChild(img, preview);
          preview = img;
        }

        preview.src = e.target.result;
      };

      reader.readAsDataURL(input.files[0]);
    }
  }
</script>

</body>
</html>
